<!-- HEADER DESDE SHARED -->
<app-header title="PETRECORD"></app-header>
<!-- HEADER DESDE SHARED -->

<!-- CONTENIDO-->
<ion-content>

<!---IMAGEN LOGO -->
<app-logo> </app-logo>
<!---IMAGEN LOGO -->

    <ion-card class="ion-card">


        <h2 class="h2">Iniciar sesión</h2>
        <form [formGroup]="form" class="HomePage" (ngSubmit)="submit()" (keypress.enter)="submit()">
            <app-custom-input 
                icon="mail-outline"
                autocomplete="email"
                [control]="form.controls.email"
                type ="email"
                label="Correo"
            ></app-custom-input>

                    <div class="validators" *ngIf="form.controls.email.errors && form.controls.email.touched">
                        <div *ngIf="form.controls.email.errors?.['required']">El correo es obligatorio</div>
                        <div *ngIf="form.controls.email.errors?.['email']">Ingresa un correo valido</div>
                    </div>
          
            <app-custom-input 
                icon="lock-closed-outline"
                [control]="form.controls.password"
                label="Contraseña"
                type="password"
          
                ></app-custom-input>

                        <div class="validators" *ngIf="form.controls.password.errors && form.controls.password.touched">
                            <div *ngIf="form.controls.password.errors?.['required']">La contraseña es obligatoria</div>
                        </div>
          
          {{form.value | json}}

          <ion-button type="submit" class="submit" [disabled]="form.invalid">
            Ingresar
            <ion-icon  name="log-in-outline"></ion-icon>
          </ion-button>
          </form>


          <div>
            <ion-button shape="round">
                Olvide mi contraseña
            </ion-button>
          </div>
          <div>
            <ion-button shape="round">
                Crear cuenta
            </ion-button>
          </div>
        
    </ion-card>




</ion-content>
