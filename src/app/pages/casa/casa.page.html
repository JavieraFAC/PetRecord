<ion-header>
  <ion-toolbar>
    <ion-title>Home</ion-title>
    <ion-buttons slot="start">
      <ion-menu-button menu="main-menu"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="fondo">
  
  <p> Bienvenido Veterinaria</p>


  <ion-grid [fixed]="true">
    <ion-row>

      <ion-col size="6" size-md="4" size-lg="2" >
        <ion-button  (click)="citas()">citas</ion-button>
      </ion-col>

      <ion-col size="6" size-md="4" size-lg="2">
        <ion-button  (click)="cmedica()">Configuracion </ion-button>
      </ion-col>

      <ion-col size="6" size-md="4" size-lg="2">
        <ion-button  (click)="tutores()">Tutores</ion-button>
      </ion-col>

      <ion-col  size="6" size-md="4" size-lg="2">
        <ion-button  (click)="perfil()">mi Perfil</ion-button>
      </ion-col>
      

      <ion-col  size="6" size-md="4" size-lg="2">
        <ion-button  (click)="calendario()">Calendario</ion-button>
      </ion-col>

      <ion-col  size="6" size-md="4" size-lg="2">
        <ion-button  (click)="ayudarlinea()">Ayudar en Linea</ion-button>
      </ion-col>
      

    </ion-row>
  </ion-grid>
  
</ion-content>
